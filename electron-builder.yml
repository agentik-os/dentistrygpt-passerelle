appId: com.dentistrygpt.passerelle
productName: DentistryGPT Passerelle
copyright: Copyright © 2026 DentistryGPT

directories:
  output: release
  buildResources: resources

files:
  - dist-electron
  - dist

mac:
  target:
    - dmg
    - zip
  artifactName: ${productName}-${version}-${arch}.${ext}

win:
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

linux:
  target:
    - AppImage
  artifactName: ${productName}-${version}.${ext}
