appId: com.dentistrygpt.passerelle
productName: DentistryGPT Passerelle
copyright: Copyright © 2026 DentistryGPT

protocols:
  - name: DentistryGPT Passerelle
    schemes:
      - dentistrygpt-passerelle

directories:
  output: release
  buildResources: resources

files:
  - dist-electron
  - dist

mac:
  target:
    - dmg
    - zip
  artifactName: ${productName}-${version}-${arch}.${ext}
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  # notarize: true  # TODO: configure after first signed release

win:
  target:
    - nsis
  artifactName: ${productName}-${version}-setup.${ext}
  publisherName: DentistryGPT
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  include: resources/installer.nsh
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  deleteAppDataOnUninstall: false

linux:
  target:
    - AppImage
  artifactName: ${productName}-${version}.${ext}
